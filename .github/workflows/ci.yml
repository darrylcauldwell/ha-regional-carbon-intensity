name: CI

on:
  push:
    paths:
      - 'homeassistant/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install homeassistant aioukcarbon ruff

      - name: Lint with ruff
        run: ruff check homeassistant/ tests/

      - name: Validate integration with hassfest
        run: |
          python -m homeassistant.scripts.hassfest \
            --integration-path homeassistant/components/uk_carbon_intensity

  test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install homeassistant aioukcarbon pytest pytest-asyncio pytest-homeassistant-custom-component

      - name: Run tests
        run: pytest tests/components/uk_carbon_intensity/ -v
